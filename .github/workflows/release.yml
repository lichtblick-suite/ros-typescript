name: Publish to NPM

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # provenance
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - run: corepack enable
      - run: yarn install --immutable

      # tag looks like "rosbag/v1.2.3" -> extract "rosbag"
      - name: Resolve package
        id: pkg
        run: echo "name=${GITHUB_REF_NAME%%/v*}" >> "$GITHUB_OUTPUT"

      # build the package + its deps in order
      - run: yarn workspaces foreach -Rp --topological-dev --from @foxglove/${{ steps.pkg.outputs.name }} run build

      - run: yarn workspace @foxglove/${{ steps.pkg.outputs.name }} npm publish --provenance --access public
